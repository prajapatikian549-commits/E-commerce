# Activate with: SPRING_PROFILES_ACTIVE=local
# PostgreSQL only; Eureka matches the default profile (Option A: full discovery stack).

server:
  port: 8085
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/ordersdb}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
