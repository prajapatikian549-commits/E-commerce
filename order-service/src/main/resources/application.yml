server:
  port: 8085

# Set true when Kafka is running (see docker-compose) and async notifications are desired.
app:
  notification:
    use-kafka: false
  kafka:
    order-events-topic: order-events

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{correlationId:-}]"

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:ordersdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          default:
            connectTimeout: 2000
            readTimeout: 5000

resilience4j:
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
  # Do not define a separate "default" retry config here: Resilience4j merges it into named
  # configs and rebuilds them with RetryConfig.from(baseDefault). That copies intervalFunction
  # from the default build, while waitDuration sets intervalBiFunction — both set → startup fails.
  retry:
    configs:
      idempotentGet:
        maxAttempts: 3
        waitDuration: 250ms
    instances:
      user-service:
        baseConfig: idempotentGet
      product-service:
        baseConfig: idempotentGet

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  health:
    circuitbreakers:
      enabled: true
    kafka:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
