server:
  port: 8081

# Same secret as api-gateway (HS256, min 32 UTF-8 bytes).
jwt:
  secret: "ecommerce-dev-jwt-secret-change-in-prod-min-32b!"
  expiration-seconds: 3600

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{correlationId:-}]"

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:h2:mem:usersdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
