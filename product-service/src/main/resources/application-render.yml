# Activated on Render via SPRING_PROFILES_ACTIVE=render (no Redis/Eureka in that environment).
# No Zipkin in the container: avoid failed span export to localhost:9411
management:
  tracing:
    enabled: false

spring:
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

eureka:
  client:
    enabled: false
