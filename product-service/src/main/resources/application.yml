server:
  # Render injects PORT; local dev uses 8082 when PORT is unset.
  port: ${PORT:8082}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{correlationId:-}]"

spring:
  application:
    name: product-service
  config:
    import: optional:classpath:tracing-common.yml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    # Use SPRING_CACHE_TYPE=simple on Render when Redis is not provisioned yet.
    type: ${SPRING_CACHE_TYPE:redis}
    redis:
      time-to-live: 10m
  datasource:
    url: jdbc:h2:mem:productsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    prefer-ip-address: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
